<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deadliner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/media.css">
    <link rel="shortcut icon" href="./img/icons8-timer-50.png">
  </head>
  <body>
     <div id="dl_modal" class="modal_hidden">
      <div class="modal" tabindex="-1">
       <div class="modal-dialog">
         <div class="modal-content">
         <div class="modal-header">
         <h5 class="modal-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>You've reached your deadline!</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
      </div>
    </div>
    <div id="general_wrapper">
      <div id="top_wrapper">
        <div id="choose_theme_wrap">
          <button id="choose_bg_but">choose background</button>
          <div class="gallery_wrap">
            <img
              class="bg_img"
              src="./img/boke.jpg"
              alt="img"
              width="120"
              height="70"
            />
            <img
              class="bg_img"
              src="./img/flowers.jpg"
              alt="img"
              width="120"
              height="70"
            />
            <img
              class="bg_img"
              src="./img/mashroom.jpg"
              alt="img"
              width="120"
              height="70"
            />
            <img
              class="bg_img"
              src="./img/palm.jpg"
              alt="img"
              width="120"
              height="70"
            />
            <img
              class="bg_img"
              src="./img/space.jpg"
              alt="img"
              width="120"
              height="70"
            />
          </div>
        </div>

        <div id="set_deadline_wrapper">
          <input type="datetime-local" class="set_deadline" id="inp_deadline" />
          <button class="set_deadline" id="set_deadline_button">
            set new deadline
          </button>
        </div>

        <button id="clear_dl">clear deadline</button>
      </div>

      <div class="timers">
        <div class="time_left" id="timer__total"></div>
        <div class="time_left" id="timer__days"></div>
        <div class="time_left" id="timer__hours"></div>
        <div class="time_left" id="timer__minutes"></div>
        <div class="time_left" id="timer__seconds"></div>
      </div>
    </div>

    <script src="./script/index.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
